<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel da Cozinha - Rei do Smash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">🍔 Pedidos em Tempo Real</h2>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nº</th>
                            <th>Cliente</th>
                            <th>Pedido</th>
                            <th>Total</th>
                            <th>Pagamento</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for pedido in pedidos %}
                        <tr>
                            <td>#{{ pedido.id }}</td>
                            <td><strong>{{ pedido.nome }}</strong></td>
                            <td>{{ pedido.itens }}</td>
                            <td>{{ pedido.total }}</td>
                            <td>{{ pedido.pagamento }}</td>
                            <td>
                                <button class="btn btn-warning btn-sm">Imprimir</button>
                                <button class="btn btn-success btn-sm">Finalizar</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
